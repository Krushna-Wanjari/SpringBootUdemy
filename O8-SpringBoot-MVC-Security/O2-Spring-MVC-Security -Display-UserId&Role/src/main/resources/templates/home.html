<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>This is Home Page</title>
</head>
<body>
      <h1>Welcome</h1>
      <!-- sec helps connect the current login details-->
      <p>
          Username : <span sec:authentication="principal.username"></span><br>
          Roles : <span sec:authentication="principal.authorities"></span>
      </p>
      <form th:action="@{/logout}" method="post">
          <button type="submit"
                  style="padding:10px 20px;
                   background:#dc3545;
                   color:white;
                   border:none;
                   border-radius:5px;
                   cursor:pointer;">
              Logout
          </button>
      </form>
</body>
</html>
